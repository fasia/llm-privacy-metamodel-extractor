<line x1="460" y1="370" x2="422" y2="370" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3" fill="none" marker-end="url(#arr2)"/>
<text x="441" y="362" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">drives</text>

<!-- → Gap analysis (mid y=522) -->
<line x1="460" y1="522" x2="422" y2="522" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3" fill="none" marker-end="url(#arr2)"/>
<text x="441" y="514" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">drives</text>
