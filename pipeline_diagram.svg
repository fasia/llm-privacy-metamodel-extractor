<svg width="680" viewBox="0 0 680 606" xmlns="http://www.w3.org/2000/svg" style="font-family:sans-serif;background:#fff">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── INPUT ──────────────────────────────────────────────────────────── -->
<rect x="40" y="20" width="380" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="230" y="40" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Input — legal text documents</text>
<text x="230" y="58" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">GDPR · CCPA · LGPD · PIPEDA — one .pdf or .txt per law</text>

<!-- arrow -->
<line x1="230" y1="72" x2="230" y2="92" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── RAG PIPELINE ───────────────────────────────────────────────────── -->
<rect x="40" y="92" width="380" height="130" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="230" y="114" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">RAG pipeline</text>
<text x="56" y="135" dominant-baseline="central" font-size="12" fill="#0F6E56">chunker — article/clause hierarchy · 5 law-specific regex sets</text>
<text x="56" y="155" dominant-baseline="central" font-size="12" fill="#0F6E56">embedder — TF-IDF vectoriser · sentence-transformer swap-in</text>
<text x="56" y="175" dominant-baseline="central" font-size="12" fill="#0F6E56">store — SQLite chunk index · law + concept-tag metadata</text>
<text x="56" y="195" dominant-baseline="central" font-size="12" fill="#0F6E56">retriever — concept-tag pre-filter · cosine similarity rerank</text>

<!-- arrow -->
<line x1="230" y1="222" x2="230" y2="242" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── LLM EXTRACTION ENGINE ──────────────────────────────────────────── -->
<rect x="40" y="242" width="380" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="230" y="264" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">LLM extraction engine</text>
<text x="56" y="285" dominant-baseline="central" font-size="12" fill="#854F0B">Pass 1 — one LLM call per concept · RAG chunks injected as context</text>
<text x="56" y="305" dominant-baseline="central" font-size="12" fill="#854F0B">Pass 2 — PolicyStatement assembly · OCL consistency pre-checks</text>

<!-- arrow -->
<line x1="230" y1="322" x2="230" y2="342" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── PYDANTIC VALIDATION ────────────────────────────────────────────── -->
<rect x="40" y="342" width="380" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="230" y="364" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Pydantic validation + OCL</text>
<text x="230" y="382" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">error → rejection queue + retry · warning → compliance gap log</text>

<!-- arrow -->
<line x1="230" y1="398" x2="230" y2="418" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── MODEL REPOSITORY ───────────────────────────────────────────────── -->
<rect x="40" y="418" width="380" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="230" y="436" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Model repository</text>
<text x="230" y="453" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">one PolicyStatement per article · SQLite · denormalised columns</text>

<!-- arrow -->
<line x1="230" y1="462" x2="230" y2="482" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── GAP ANALYSIS ───────────────────────────────────────────────────── -->
<rect x="40" y="482" width="380" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="230" y="504" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Gap analysis layer</text>
<text x="230" y="522" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">legal basis · rights · retention · DPIA · transfer coverage (Q1–Q7)</text>
<text x="230" y="540" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">cross-law delta · coverage matrix · pairwise gaps (Q8–Q9)</text>
<text x="230" y="554" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">JSON export · formatted report</text>

<!-- ── CORE METAMODEL (right column) ─────────────────────────────────── -->
<rect x="460" y="92" width="180" height="470" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="550" y="114" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Core metamodel</text>
<text x="550" y="132" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">PrivacyPolicyMetamodel v4</text>

<line x1="468" y1="146" x2="632" y2="146" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="476" y="163" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">Structure</text>
<text x="476" y="181" dominant-baseline="central" font-size="12" fill="#534AB7">14 classes · 29 assocs</text>
<text x="476" y="199" dominant-baseline="central" font-size="12" fill="#534AB7">13 enums · 74 literals</text>
<text x="476" y="217" dominant-baseline="central" font-size="12" fill="#534AB7">5 OCL constraints</text>

<line x1="468" y1="233" x2="632" y2="233" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="476" y="250" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">Generates</text>
<text x="476" y="268" dominant-baseline="central" font-size="12" fill="#534AB7">Pydantic schema</text>
<text x="476" y="286" dominant-baseline="central" font-size="12" fill="#534AB7">10 extraction prompts</text>
<text x="476" y="304" dominant-baseline="central" font-size="12" fill="#534AB7">Gap analysis queries</text>

<line x1="468" y1="320" x2="632" y2="320" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="476" y="337" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">Format</text>
<text x="476" y="355" dominant-baseline="central" font-size="12" fill="#534AB7">XMI 2.1 · Ecore</text>
<text x="476" y="373" dominant-baseline="central" font-size="12" fill="#534AB7">Papyrus · EA · EMF</text>

<line x1="468" y1="389" x2="632" y2="389" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="476" y="406" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">Reuse per new law</text>
<text x="476" y="424" dominant-baseline="central" font-size="12" fill="#534AB7">~20 lines changed</text>
<text x="476" y="442" dominant-baseline="central" font-size="12" fill="#534AB7">99.4% code reused</text>

<line x1="468" y1="458" x2="632" y2="458" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="476" y="475" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">To add a new law</text>
<text x="476" y="493" dominant-baseline="central" font-size="12" fill="#534AB7">1. ingest_file()</text>
<text x="476" y="511" dominant-baseline="central" font-size="12" fill="#534AB7">2. cross-law mappings</text>
<text x="476" y="529" dominant-baseline="central" font-size="12" fill="#534AB7">3. Jurisdiction entry</text>

